# Single-service deployment: one container serves both the FastAPI backend and
# the built React frontend on the same origin. Start with: docker compose up -d
services:
  graph-digitizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: graph-digitizer:latest
    ports:
      - "8000:8000"
    environment:
      # Same-origin deploy needs no CORS. Uncomment and set if you host the
      # frontend separately (comma-separated list of allowed origins):
      # ALLOWED_ORIGINS: "https://digitizer.example.com"
      HOME: /home/appuser
    volumes:
      # Persist the ~100 MB PaddleOCR model weights across restarts so they
      # aren't re-downloaded on every container start.
      - paddle-cache:/home/appuser/.paddleocr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  paddle-cache:
