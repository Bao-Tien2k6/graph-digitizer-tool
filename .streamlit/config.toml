# Streamlit runtime configuration for PlotDigitizer.

[server]
# EasyOCR pulls in PyTorch. Streamlit's default source-file watcher tries to
# introspect `torch.classes`, which raises a RuntimeError that can crash the
# server ("Is Streamlit still running?"). Disabling the watcher avoids it.
# Trade-off: edits to .py files won't hot-reload — press "R" or restart to
# pick up code changes.
fileWatcherType = "none"
runOnSave = false

# Allow large figure uploads (default is 200 MB; this is plenty for batches).
maxUploadSize = 400

[runner]
# Collapse multiple widget changes in one interaction into a single rerun.
fastReruns = true

[browser]
gatherUsageStats = false
